version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: office_hours_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: office_hours
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: office_hours_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@postgres:5432/office_hours
      - DATABASE_URL_TEST=postgresql+asyncpg://postgres:password@postgres:5432/office_hours_test
      - SECRET_KEY=dev-secret-key-change-in-production-use-openssl-rand-hex-32
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - EMBEDDING_MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
      - DUPLICATE_SIMILARITY_THRESHOLD=0.75
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
      - PROJECT_NAME=Office Hours Queue System
      - API_V1_PREFIX=/api/v1
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
