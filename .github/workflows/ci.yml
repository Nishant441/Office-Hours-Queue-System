name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: office_hours_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Enable pgvector extension
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d office_hours_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/office_hours
          DATABASE_URL_TEST: postgresql+asyncpg://postgres:postgres@localhost:5432/office_hours_test
          SECRET_KEY: test-secret-key-for-ci
        run: |
          cd backend
          alembic upgrade head
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/office_hours
          DATABASE_URL_TEST: postgresql+asyncpg://postgres:postgres@localhost:5432/office_hours_test
          SECRET_KEY: test-secret-key-for-ci
          EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
        run: |
          cd backend
          pytest --cov=app --cov-report=term --cov-report=xml
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false
